<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Main CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <title>Developer Portfolio</title>
</head>
<body>
    <nav class='navbar'>
        <ul class="nav-list">
            <li class="nav-item"> <a href="#about">About Me</a></li>
            <li class="nav-item"> <a href="#skills">Skills</a></li>
            <li class="nav-item"> <a href="#portfolio">Portfolio</a></li>
            <li class="nav-item"> <a href="#contact">Contact Me</a></li>
        </ul>
        <div class="theme-toggle">
            <button>
                <ion-icon name="moon" class="theme-button"></ion-icon>
            </button>
        </div>
    </nav>
    <section class='about' id="about">
        <hr>
        <h1>About Me</h1>
        <p>I am an aspiring FullStack JavaScript Developer. I have been working in IT for a few years in deploy and ops. I primarily do freelance Web Development and am a full time Systems Administrator.
            <br>
            <ion-icon name="logo-html5"></ion-icon>
            <ion-icon name="logo-css3"></ion-icon>
            <ion-icon name="logo-javascript"></ion-icon>
        </p>
        <hr>
    </section>
    <section class='skills' id="skills">

    </section>
    <section class="portfolio" id="portfolio">

    </section>
    <section class="contact" id="contact">
        <h2>Contact Me</h2>
        <div class="name-box">
            <input type="text" placeholder="Enter Name" class="name-field">
        </div>
        <div class="email-box">
            <input type="email" placeholder="Enter Email" class="email-field">
        </div>
        <div class="message-box">
            <input type="text" placeholder="Type Message" class="text-field">
        </div>
        <div class="submit">
            <button type="submit" class="submit-button">Send</button>
        </div>
    </section>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
